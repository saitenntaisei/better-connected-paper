services:
  postgres:
    image: postgres:17-alpine
    container_name: bcp-postgres
    environment:
      POSTGRES_USER: bcp
      POSTGRES_PASSWORD: bcp
      POSTGRES_DB: bcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcp -d bcp"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: bcp-backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://bcp:bcp@postgres:5432/bcp?sslmode=disable
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: bcp-frontend
    environment:
      VITE_API_BASE: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
